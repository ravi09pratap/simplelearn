<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Blog</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <h1>Simple Blog</h1>

  <h2>Create a New Blog</h2>
  <form id="blogForm">
    <div class="form-group">
      <label for="blogName">Blog Title</label>
      <input type="text" id="blogName" name="blogName" placeholder="Enter blog title" required>
    </div>
    <div class="form-group">
      <label for="authorName">Author Name</label>
      <input type="text" id="authorName" name="authorName" placeholder="Enter your name" required>
    </div>
    <div class="form-group">
      <label for="blogText">Blog Content</label>
      <textarea id="blogText" name="blogText" placeholder="Write your blog here..." required></textarea>
    </div>
    <button type="submit">Publish Blog</button>
    <div id="message"></div>
  </form>

  <h2>All Blogs</h2>
  <div id="blogsList">
    <p>Loading blogs...</p>
  </div>

  <script>
    const blogForm = document.getElementById('blogForm');
    const blogsList = document.getElementById('blogsList');
    const message = document.getElementById('message');

    function showMessage(text, isError = false) {
      message.textContent = text;
      message.style.color = isError ? 'red' : 'green';
      setTimeout(() => { message.textContent = ''; }, 3000);
    }

    async function loadBlogs() {
      try {
        const res = await fetch('/api/blogs');
        const blogs = await res.json();

        if (blogs.length === 0) {
          blogsList.innerHTML = '<p>No blogs yet. Be the first to write one!</p>';
          return;
        }

        blogsList.innerHTML = blogs.map(blog => `
          <div class="blog-card">
            <h3>${escapeHtml(blog.blogName)}</h3>
            <div class="blog-meta">
              By <strong>${escapeHtml(blog.authorName)}</strong> · ${new Date(blog.createdAt).toLocaleString()}
            </div>
            <div class="blog-text">${escapeHtml(blog.blogText)}</div>
            <button onclick="deleteBlog('${blog._id}')">Delete</button>
          </div>
        `).join('');
      } catch (err) {
        blogsList.innerHTML = '<p>Error loading blogs.</p>';
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    blogForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const blogName = document.getElementById('blogName').value.trim();
      const authorName = document.getElementById('authorName').value.trim();
      const blogText = document.getElementById('blogText').value.trim();

      if (!blogName || !authorName || !blogText) {
        showMessage('Please fill in all fields.', true);
        return;
      }

      try {
        const res = await fetch('/api/blogs', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ blogName, authorName, blogText })
        });

        if (res.ok) {
          showMessage('Blog published successfully!');
          blogForm.reset();
          loadBlogs();
        } else {
          showMessage('Failed to publish blog.', true);
        }
      } catch (err) {
        showMessage('Network error. Please try again.', true);
      }
    });

    async function deleteBlog(id) {
      if (!confirm('Are you sure you want to delete this blog?')) return;

      try {
        const res = await fetch(`/api/blogs/${id}`, { method: 'DELETE' });
        if (res.ok) {
          showMessage('Blog deleted.');
          loadBlogs();
        } else {
          showMessage('Failed to delete blog.', true);
        }
      } catch (err) {
        showMessage('Network error.', true);
      }
    }

    loadBlogs();
  </script>
</body>
</html>
